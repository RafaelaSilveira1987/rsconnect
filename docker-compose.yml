services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY:-}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: rs_connect
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rs_connect
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/migrations/002_companies_users_onboarding.sql:/docker-entrypoint-initdb.d/03-002.sql:ro
      - ./database/migrations/003_conversations.sql:/docker-entrypoint-initdb.d/04-003.sql:ro
      - ./database/migrations/004_crm.sql:/docker-entrypoint-initdb.d/05-004.sql:ro
      - ./database/migrations/005_ai_automations.sql:/docker-entrypoint-initdb.d/06-005.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  mysql_data:
